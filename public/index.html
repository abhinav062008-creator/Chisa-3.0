<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Chisa · Wuthering Waves</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Wave background -->
    <div class="wave-bg">
        <div class="wave wave1"></div>
        <div class="wave wave2"></div>
        <div class="wave wave3"></div>
    </div>

    <div class="container">
        <!-- Header with Wuthering Waves style -->
        <header class="ww-header">
            <div class="header-left">
                <i class="fas fa-water"></i>
                <h1>WUTHERING WAVES</h1>
            </div>
            <button class="reset-button" id="resetBtn">
                <i class="fas fa-redo-alt"></i>
            </button>
        </header>

        <!-- Main chat area -->
        <main class="chat-main">
            <!-- Avatar section -->
            <div class="avatar-section">
                <div class="avatar-wrapper">
                    <div class="avatar-glow" id="avatarGlow"></div>
                    <div class="avatar-frame">
                        <div id="chisaAvatar" class="chisa-avatar"></div>
                    </div>
                    <div class="emotion-badge" id="emotionTag">serene</div>
                </div>
                <h2 class="chisa-name">CHISA</h2>
                <div class="voice-indicator" id="voiceIndicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>

            <!-- Messages area -->
            <div class="messages-container" id="messagesArea">
                <div class="message received">
                    <div class="message-sender">Chisa</div>
                    <div class="message-bubble">
                        🌊 The tide whispers your name... I've been waiting, tidetamer. What mysteries shall we explore?
                    </div>
                </div>
            </div>

            <!-- Typing indicator -->
            <div class="typing-indicator" id="typingIndicator">
                <span></span>
                <span></span>
                <span></span>
                <span class="typing-text">Chisa is thinking...</span>
            </div>

            <!-- Input area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <i class="fas fa-wave-square input-icon"></i>
                    <input 
                        type="text" 
                        id="userInput" 
                        placeholder="Ask Chisa anything..."
                        autocomplete="off"
                    >
                    <button class="send-button" id="sendBtn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="input-hint">
                    <i class="fas fa-chevron-up"></i>
                    <span>Chisa loves deep conversations</span>
                </div>
            </div>
        </main>
    </div>

    <script src="assets/avatar-states.js"></script>
    <script src="script.js"></script>
</body>
</html>
